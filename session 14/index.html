<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="mb-4 text-center">User Management Form</h2>
            
            <!--form-->
            <form id="userForm" class="row g-3">
                <div class="col-md-6">
                    <label for="userName" class="form-label">Name</label>
                    <input type="text" class="form-control" id="userName" placeholder="Enter your name" required>
                </div>
                
                <div class="col-md-6">
                    <label for="userEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="userEmail" placeholder="Enter your email" required>
                </div>

                <!-- buttons-->
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary" id="addBtn">Add User</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn">Delete User</button>
                </div>
            </form>
        </div>

        <div id="divsContainer" class="row mt-4 g-3"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
